services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot init: seeds the embedding model into the `ollama` volume, then exits.
  # The ollama CLI here is just a client -- OLLAMA_HOST points it at the ollama service,
  # so the *server* downloads the model into its volume; nothing is stored in this container.
  # r2r waits for this to complete, so `docker compose up -d` needs no manual pull step.
  # Re-runs are a fast no-op once the model is cached in the volume.
  # NOTE: must match [embedding].base_model in my_config.toml.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: ["pull", "mxbai-embed-large"]
    restart: "no"

  r2r:
    build:
      context: .
      dockerfile: Dockerfile.r2r
    image: knowledge-base/r2r-patched:latest
    ports:
      - "7272:8000"
    environment:
      R2R_POSTGRES_USER: postgres
      R2R_POSTGRES_PASSWORD: postgres
      R2R_POSTGRES_HOST: postgres
      R2R_POSTGRES_PORT: 5432
      R2R_POSTGRES_DBNAME: postgres
      GROQ_API_KEY: ${GROQ_API_KEY}
      OLLAMA_API_BASE: http://ollama:11434
      R2R_CONFIG_PATH: /app/user_configs/my_config.toml
    volumes:
      - ./my_config.toml:/app/user_configs/my_config.toml
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

  dashboard:
    image: sciphiai/r2r-dashboard:latest
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_R2R_DEPLOYMENT_URL: http://localhost:7272

volumes:
  pgdata:
  ollama: